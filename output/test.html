                        return '<li><strong>' + info.node + '</strong><br>' +
                               '关系: ' + info.relation + 
                               (info.explanation ? '<br>说明: ' + info.explanation : '') +
                               '</li>';
                    }).join('')}
                </ul>
            `;
            
            infoPanel.innerHTML = infoHTML;
            infoPanel.style.display = 'block';
        } else {
            infoPanel.style.display = 'none';
        }
    });
    
    // 重置视图函数
    window.resetView = function() {
        network.fit();
        infoPanel.style.display = 'none';
    };
});
</script>
</body>
